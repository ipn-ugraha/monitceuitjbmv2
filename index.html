<style>
:root{--bg0:#080c10;--bg1:#0d1117;--bg2:#161b22;--bg3:#1f2937;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--accent:#58a6ff;--accent2:#1f6feb;--green:#3fb950;--red:#f85149;--amber:#d29922;--purple:#a371f7;--font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-d);background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden}

.leg-row{display:flex;flex-wrap:wrap;gap:14px;font-family:var(--font-m);font-size:10px;color:var(--text3);margin-bottom:10px}

/* Per-category charts grid */
.charts-section{margin-bottom:24px}
.charts-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}

/* Rekap detail charts */
.detail-chart-block{margin-bottom:20px}
.detail-chart-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grp-badge{font-family:var(--font-m);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px}
.chart-card{background:var(--bg2);border:1px solid rgba(0,100,180,0.1);border-radius:var(--rl);padding:14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(0,60,140,0.08)}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:10px;color:var(--text2)}
.legend-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.mini-prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.mini-prog-name{font-size:10px;color:var(--text2);margin-bottom:2px;font-family:var(--font-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.footer{text-align:center;padding:24px 0 12px;border-top:1px solid rgba(0,100,180,0.15);font-family:var(--font-m);font-size:10px;color:var(--text3);line-height:1.8;background:linear-gradient(to top,rgba(0,100,180,0.03),transparent)}
@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr)}.upt-grid{grid-template-columns:repeat(2,1fr)}.panels-grid{grid-template-columns:1fr}.cat-charts-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stat-row{grid-template-columns:1fr 1fr}.upt-grid{grid-template-columns:1fr}.cat-charts-grid{grid-template-columns:1fr}.container{padding:0 12px 40px}}

  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}}
  .stat-card{animation:fadeInUp 0.4s ease both}
  .upt-card{animation:fadeInUp 0.4s ease both}

  .slb{font-family:var(--font-m);font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
  .sv{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums}
  .ssub{font-family:var(--font-m);font-size:11px;color:var(--text3)}
  .upt-name{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--text2);text-transform:uppercase}
  .upt-pct{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .gpanel-pct{font-family:var(--font-m);font-size:13px;font-weight:600}
  .cat-chart-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  .cat-chart-name{font-size:10px;font-weight:600;font-family:var(--font-m)}
  .cat-chart-pct{font-size:12px;font-weight:700;font-family:var(--font-m)}
  .cat-chart-wrap{position:relative;width:100%;height:110px}
  .cat-chart-foot{display:flex;justify-content:space-between;margin-top:5px;font-family:var(--font-m);font-size:9px;color:var(--text3)}
</style>

<body>
<div id="loading-overlay" style="position:fixed;inset:0;z-index:9999;background:rgba(8,12,16,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="width:48px;height:48px;border:3px solid rgba(88,166,255,0.2);border-top-color:#58a6ff;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div id="loading-msg" style="font-family:'DM Mono',monospace;font-size:13px;color:#8b949e">Memuat data...</div>
  <div style="font-family:'DM Mono',monospace;font-size:10px;color:#484f58">Common Enemy Dashboard · UIT JBM</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<div id="gi-bg-layer" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden">
<canvas id="elec-canvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
</div>
<script>
(function(){
  var canvas = document.getElementById('elec-canvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Palette ──────────────────────────────────────────────
  var COLORS = ['#58a6ff','#3fb950','#a371f7','#d29922','#f0883e','#f85149'];
  var BOLT_COLOR = '#58a6ff';

  // ── Bolt class ───────────────────────────────────────────
  function Bolt(){
    this.reset();
  }
  Bolt.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = 0;
    this.points = [];
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.alpha = 0;
    this.life = 0;
    this.maxLife = 18 + Math.floor(Math.random()*20);
    this.width = 1 + Math.random()*1.5;
    this.glowWidth = 4 + Math.random()*8;
    this.vertical = Math.random() > 0.3; // 70% vertical
    this._generate();
  };
  Bolt.prototype._generate = function(){
    var pts = [];
    var cx = this.x, cy = 0;
    var steps = 6 + Math.floor(Math.random()*8);
    var length = (this.vertical ? H : W) * (0.3 + Math.random()*0.5);
    for(var s=0; s<=steps; s++){
      var t = s/steps;
      if(this.vertical){
        cx = this.x + (Math.random()-0.5)*80;
        cy = t * length;
      } else {
        cx = this.x + t * length;
        cy = this.y + (Math.random()-0.5)*60;
      }
      pts.push({x:cx, y:cy});
      // branch
      if(s > 0 && s < steps && Math.random() > 0.6){
        var branch = [];
        var bx = cx, by = cy;
        var bsteps = 3 + Math.floor(Math.random()*3);
        for(var b=0; b<bsteps; b++){
          bx += (Math.random()-0.5)*40 + (this.vertical?20:-10);
          by += this.vertical?(20+Math.random()*20):(Math.random()-0.5)*20;
          branch.push({x:bx,y:by});
        }
        pts.push({branch:branch, from:{x:cx,y:cy}});
      }
    }
    this.points = pts;
    if(!this.vertical){
      this.x = Math.random() * W * 0.3;
      this.y = Math.random() * H;
    }
  };
  Bolt.prototype.draw = function(){
    if(this.life >= this.maxLife){ this.reset(); return; }
    this.life++;
    // alpha curve: fast in, slow out
    var t = this.life / this.maxLife;
    this.alpha = t < 0.2 ? t/0.2 : 1 - ((t-0.2)/0.8);
    this.alpha = Math.max(0, this.alpha);

    var pts = this.points;
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.9;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = this.color;

    // draw main bolt
    ctx.shadowBlur = this.glowWidth;
    ctx.shadowColor = this.color;
    ctx.lineWidth = this.width;
    ctx.beginPath();
    var started = false;
    for(var i=0; i<pts.length; i++){
      if(pts[i].branch) continue;
      if(!started){ ctx.moveTo(pts[i].x, pts[i].y); started=true; }
      else { ctx.lineTo(pts[i].x, pts[i].y); }
    }
    ctx.stroke();

    // draw branches
    for(var i=0; i<pts.length; i++){
      if(!pts[i].branch) continue;
      ctx.globalAlpha = this.alpha * 0.5;
      ctx.lineWidth = this.width * 0.6;
      ctx.shadowBlur = this.glowWidth * 0.6;
      ctx.beginPath();
      ctx.moveTo(pts[i].from.x, pts[i].from.y);
      var br = pts[i].branch;
      for(var b=0; b<br.length; b++) ctx.lineTo(br[b].x, br[b].y);
      ctx.stroke();
    }

    // spark at end point
    if(t > 0.1 && t < 0.5){
      var last = null;
      for(var i=pts.length-1; i>=0; i--){
        if(!pts[i].branch){ last=pts[i]; break; }
      }
      if(last){
        ctx.globalAlpha = this.alpha * (1-t*2);
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(last.x, last.y, 2+Math.random()*2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  };

  // ── Particle class ───────────────────────────────────────
  function Particle(){
    this.reset();
  }
  Particle.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = 0.5 + Math.random()*1.5;
    this.alpha = 0.1 + Math.random()*0.6;
    this.da = (Math.random()*0.02 + 0.005) * (Math.random()>0.5?1:-1);
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
  };
  Particle.prototype.draw = function(){
    this.alpha += this.da;
    if(this.alpha > 0.8 || this.alpha < 0.05) this.da *= -1;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  };

  // ── Grid ─────────────────────────────────────────────────
  function drawGrid(){
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = 0.5;
    var step = 60;
    for(var x=0; x<W; x+=step){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for(var y=0; y<H; y+=step){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    // fine grid
    ctx.globalAlpha = 0.02;
    step = 15;
    for(var x=0; x<W; x+=step){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for(var y=0; y<H; y+=step){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Energy orbs ──────────────────────────────────────────
  var orbs = [
    {x:0.2,y:0.5,r:200,color:'rgba(31,107,235,0.06)',phase:0,speed:0.008},
    {x:0.8,y:0.25,r:260,color:'rgba(88,166,255,0.04)',phase:2,speed:0.006},
    {x:0.55,y:0.85,r:180,color:'rgba(63,185,80,0.04)',phase:4,speed:0.007},
    {x:0.1,y:0.1,r:140,color:'rgba(163,113,247,0.04)',phase:1,speed:0.009},
  ];
  function drawOrbs(t){
    for(var i=0; i<orbs.length; i++){
      var o = orbs[i];
      var pulse = 1 + 0.08*Math.sin(t*o.speed+o.phase);
      ctx.save();
      var grd = ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r*pulse);
      grd.addColorStop(0, o.color);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(o.x*W, o.y*H, o.r*pulse, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Horizontal energy lines ───────────────────────────────
  var hlines = [
    {y:0.3, alpha:0, da:0.004, maxA:0.15},
    {y:0.6, alpha:0.05, da:0.003, maxA:0.12},
    {y:0.8, alpha:0, da:0.006, maxA:0.1},
  ];
  function drawHlines(){
    for(var i=0; i<hlines.length; i++){
      var l = hlines[i];
      l.alpha += l.da;
      if(l.alpha > l.maxA || l.alpha < 0) l.da *= -1;
      ctx.save();
      ctx.globalAlpha = Math.max(0,l.alpha);
      var grd = ctx.createLinearGradient(0,0,W,0);
      grd.addColorStop(0,'rgba(88,166,255,0)');
      grd.addColorStop(0.3,'rgba(88,166,255,0.8)');
      grd.addColorStop(0.7,'rgba(88,166,255,0.8)');
      grd.addColorStop(1,'rgba(88,166,255,0)');
      ctx.strokeStyle = grd;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, l.y*H);
      ctx.lineTo(W, l.y*H);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── Init ─────────────────────────────────────────────────
  var BOLT_COUNT = 12;
  var PARTICLE_COUNT = 40;
  var bolts = [];
  var particles = [];

  for(var i=0; i<BOLT_COUNT; i++){
    var b = new Bolt();
    b.life = Math.floor(Math.random()*b.maxLife); // stagger starts
    bolts.push(b);
  }
  for(var i=0; i<PARTICLE_COUNT; i++){
    particles.push(new Particle());
  }

  // ── Background gradient (static) ─────────────────────────
  function drawBgGradient(){
    var grd = ctx.createRadialGradient(W*0.25,H*0.4,0,W*0.25,H*0.4,W*0.6);
    grd.addColorStop(0,'rgba(22,50,90,0.5)');
    grd.addColorStop(1,'rgba(8,12,16,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,H);
    var grd2 = ctx.createRadialGradient(W*0.8,H*0.3,0,W*0.8,H*0.3,W*0.5);
    grd2.addColorStop(0,'rgba(13,45,94,0.4)');
    grd2.addColorStop(1,'rgba(8,12,16,0)');
    ctx.fillStyle = grd2;
    ctx.fillRect(0,0,W,H);
  }

  // ── Animate ───────────────────────────────────────────────
  var frame = 0;
  function animate(){
    requestAnimationFrame(animate);
    frame++;

    // Clear with dark bg
    ctx.fillStyle = '#080c10';
    ctx.fillRect(0,0,W,H);

    // Layers
    drawBgGradient();
    drawOrbs(frame);
    drawGrid();
    drawHlines();
    for(var i=0; i<particles.length; i++) particles[i].draw();
    for(var i=0; i<bolts.length; i++) bolts[i].draw();
  }
  animate();
})();
</script>

const SUB_KEYS = [

];
// Setiap sub-key punya 3 kolom: T (target), O (open), J (tindak lanjut)

const GROUP_OF = {
  'G1 AHI Trafo':'G','G1 Anti Binatang':'G','G1 Relay Internal':'G',
  'G2 MV Aparatus':'G','G3 Switchyard AHI':'G','G4 GIS':'G','G5 Common Facility':'G',

};

function csvUrl(gid){
  return 'https://docs.google.com/spreadsheets/d/e/'+SHEET_CONFIG.PUB_KEY+
    '/pub?gid='+gid+'&single=true&output=csv';
}

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    // Handle quoted fields
    var result=[]; var cur=''; var inQ=false;
    for(var i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===',' && !inQ){result.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    result.push(cur.trim());
    return result;
  });
}

function buildDBlock(rows){
  // rows[0] = header, rows[1..] = data rows
  // Kolom: Tanggal | SK1_T | SK1_O | SK1_J | SK2_T | SK2_O | SK2_J | ...
  if(rows.length < 2) return null;
  var wl = [];
  var data = {G:{},T:{},P:{}};
  var tinjutHist = {}; // tinjut per tanggal: {date: {sk: val}}
  
  SUB_KEYS.forEach(function(sk){
    var grp = GROUP_OF[sk];
    data[grp][sk] = [];
  });
  
  for(var ri=1; ri<rows.length; ri++){
    var row = rows[ri];
    if(!row[0] || row[0].trim()==='') continue;
    var date = row[0].trim();
    wl.push(date);
    tinjutHist[date] = {};
    
    SUB_KEYS.forEach(function(sk, si){
      var grp = GROUP_OF[sk];
      var tIdx = 1 + si*3;
      var oIdx = 1 + si*3 + 1;
      var jIdx = 1 + si*3 + 2;
      var t = parseInt(row[tIdx])||0;
      var o = parseInt(row[oIdx])||0;
      var j = parseInt(row[jIdx])||0;
      data[grp][sk].push({t:t, o:o, j:j});
      if(j>0) tinjutHist[date][sk] = j;
    });
  }
  return {wl:wl, data:data, tinjutHist:tinjutHist};
}

async function fetchCSV(gid){
  try{
    var url = csvUrl(gid);
    var resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    return await resp.text();
  }catch(e){
    console.error('Fetch error gid='+gid, e);
    return null;
  }
}

// Safe array accessor - always returns last available point
function safeGet(arr, idx){
  if(!arr || arr.length===0) return {t:0,o:0,j:0};
  var i = Math.min(idx, arr.length-1);
  var pt = arr[i] || arr[arr.length-1] || {t:0,o:0,j:0};
  return {t:pt.t||0, o:pt.o||0, j:pt.j||0};
}
function safeT(arr,i){return safeGet(arr,i).t;}
function safeO(arr,i){return safeGet(arr,i).o;}
function safeJ(arr,i){return safeGet(arr,i).j||0;}


const darkBg = {id:'darkBg',beforeDraw:(chart)=>{const ctx=chart.canvas.getContext('2d');ctx.save();ctx.fillStyle='#161b22';ctx.fillRect(0,0,chart.width,chart.height);ctx.restore()}};


function pct(o,t){return !t?100:Math.round((1-o/t)*100)}
function oColor(o,t){return !t?'#484f58':o===0?'#3fb950':o===t?'#f85149':'#d29922'}
function adjVal(name,v){return ROW_KEYS.includes(name)?v/ROW_DIVISOR:v}

function groupAggAdj(upt,grp,wi){
  let t=0,o=0;
  Object.entries(D[upt][grp]).forEach(([name,arr])=>{t+=adjVal(name,safeT(arr,wi));o+=adjVal(name,safeO(arr,wi));});
  return{t,o};
}

function calcProgress(upt){
  const n=WL.length-1, p=Math.max(0,n-1);
  let totT=0,totO=0,rawT=0,rawO=0,rawRow=0,rawRowO=0,prevRawO=0;
  ['G','T','P'].forEach(g=>{
    Object.entries(D[upt][g]).forEach(([name,arr])=>{
      totT+=adjVal(name,safeT(arr,n)); totO+=adjVal(name,safeO(arr,n));
      rawT+=safeT(arr,n); rawO+=safeO(arr,n); prevRawO+=safeO(arr,p);
      if(ROW_KEYS.includes(name)){rawRow+=safeT(arr,n);rawRowO+=safeO(arr,n);}
    });
  });
  return{pct:totT>0?Math.round((1-totO/totT)*100):100,adjT:Math.round(totT),adjO:Math.round(totO),rawT,rawO,rawRow,rawRowO,prevRawO,nonRowT:rawT-rawRow,nonRowO:rawO-rawRowO};
}

    const tj = TINJUT_TODAY[r.upt] || 0;
    const tjStr = tj > 0
      ? `<span style="color:#d29922;font-family:var(--font-m);font-size:10px;margin-left:3px">TL:${tj.toLocaleString()}</span>`
      : `<span style="color:var(--text3);font-family:var(--font-m);font-size:10px;margin-left:3px">TL:0</span>`;
    return `<div class="upt-card"><div class="upt-head"><span class="upt-name">${r.upt}</span><span class="upt-pct" style="color:${bc}">${r.pct}%</span></div>
    <div class="upt-bar-bg"><div class="upt-bar-f" style="width:${r.pct}%;background:${bc}"></div></div>
    <div class="upt-stats">
      <div class="upt-stat">Open <span>${r.rawO.toLocaleString()}${ds}</span></div>
      <div class="upt-stat">Target <span>${r.rawT.toLocaleString()}</span></div>
      <div class="upt-stat">Non-ROW <span>${r.nonRowO.toLocaleString()}/${r.nonRowT.toLocaleString()}</span></div>
      <div class="upt-stat">ROW B1 <span>${r.rawRowO.toLocaleString()} pohon</span></div>
      <div class="upt-stat" style="grid-column:1/-1;margin-top:4px;padding-top:6px;border-top:1px solid var(--line)">Tindak Lanjut Hari Ini <span style="color:${tj>0?'#d29922':'var(--text3)'}">${tj.toLocaleString()} anomali${tjStr}</span></div>
    </div></div>`;
  }).join('');

  // Group aggregate panels
  function buildGrpPanel(gKey){
    const gm=GROUP_META[gKey];
    const allSubs=new Set();UPTS.forEach(u=>Object.keys(D[u][gKey]).forEach(k=>allSubs.add(k)));
    const rows=[...allSubs].map(name=>{
      let totT=0,totO=0,has=false;
      UPTS.forEach(u=>{const a=D[u][gKey][name];if(a){totT+=safeT(a,n);totO+=safeO(a,n);if(safeT(a,n)>0||safeO(a,n)>0)has=true;}});
      if(!has)return'';
      const p=pct(totO,totT),oc=oColor(totO,totT);
      return `<div class="cat-row"><div class="cat-top"><span class="cat-name">${name}</span><span class="cat-nums" style="color:${oc}">${totO.toLocaleString()}/${totT.toLocaleString()}</span><span class="cat-pct" style="color:${oc}">${p}%</span></div><div class="cat-bar-bg"><div class="cat-bar-f" style="width:${p}%;background:${gm.bar}"></div></div></div>`;
    }).filter(Boolean).join('');
    let gAdjT=0,gAdjO=0;UPTS.forEach(u=>{const a=groupAggAdj(u,gKey,n);gAdjT+=a.t;gAdjO+=a.o;});
    const gp=pct(gAdjO,gAdjT),gc=oColor(gAdjO,gAdjT);
    return `<div class="gpanel"><div class="gpanel-head"><span class="gpanel-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span class="gpanel-label">${gm.label.split('–')[1].trim()}</span><span class="gpanel-pct" style="color:${gc}">${gp}%</span></div>${rows||'<div style="font-size:11px;color:var(--text3)">—</div>'}</div>`;
  }

  // Detail charts per group (UPT comparison grouped bar)
  function buildDetailCharts(){
    let html='',chartDefs=[];
    ['G','T','P'].forEach(gKey=>{
      const gm=GROUP_META[gKey];
      const allSubs=new Set();UPTS.forEach(u=>Object.keys(D[u][gKey]).forEach(k=>allSubs.add(k)));
      const active=[...allSubs].filter(name=>UPTS.some(u=>{const a=D[u][gKey][name];return a&&(safeT(a,n)>0||safeO(a,n)>0);}));
      if(!active.length)return;
      const cid='rekap_chart_'+gKey;
      const barH=Math.max(active.length*50+80,160);
      const datasets=UPTS.map(upt=>({
        label:upt,
        data:active.map(name=>{const a=D[upt][gKey][name];return a?safeO(a,n):0;}),
        targets:active.map(name=>{const a=D[upt][gKey][name];return a?safeT(a,n):0;}),
        color:UPT_COLORS[upt]
      }));
      const totalPcts=active.map(name=>{let tT=0,tO=0;UPTS.forEach(u=>{const a=D[u][gKey][name];if(a){tT+=safeT(a,n);tO+=safeO(a,n);}});return pct(tO,tT);});
      chartDefs.push({cid,active,datasets,totalPcts,barH,gKey});
      const lg=UPTS.map(u=>`<span class="chart-legend-item"><span class="legend-sq" style="background:${UPT_COLORS[u]}"></span>${u}</span>`).join('');
      const mini=active.map((name,i)=>{const p=totalPcts[i];const oc=p===100?'#3fb950':p===0?'#f85149':'#d29922';return`<div><div class="mini-prog-name">${name}</div><div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${oc};border-radius:2px"></div></div><span style="font-family:var(--font-m);font-size:9px;color:${oc};min-width:28px;text-align:right">${p}%</span></div></div>`;}).join('');
      html+=`<div class="detail-chart-block"><div class="detail-chart-head"><span class="grp-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span style="font-size:12px;color:var(--text2)">${gm.label.split('–')[1].trim()}</span></div>
      <div class="chart-card"><div class="chart-legend">${lg}</div><div style="position:relative;width:100%;height:${barH}px"><canvas id="${cid}"></canvas></div><div class="mini-prog-grid">${mini}</div></div></div>`;
    });
    return {html,chartDefs};
  }

  const {html:detailHtml,chartDefs}=buildDetailCharts();

  document.getElementById('view-rekap').innerHTML=`
    <div class="sec-head"><span class="sec-title">Ringkasan</span><span class="sec-rule"></span><span class="sec-meta">${LAST_UPDATE}</span></div>
    <div class="stat-row">
      <div class="stat-card"><div class="slb">Progress UIT JBM</div><div class="sv" style="color:${tpc}">${totalPct}%</div><div class="ssub">normalisasi ROW B1</div></div>
      <div class="stat-card"><div class="slb">Total Open</div><div class="sv" style="color:#f85149">${totalRawO.toLocaleString()}</div><div class="ssub">${dStr} vs kemarin</div></div>
      <div class="stat-card"><div class="slb">Tindak Lanjut Hari Ini</div><div class="sv" style="color:${totalTinjut>0?'#d29922':'var(--text3)'}">${totalTinjut.toLocaleString()}</div><div class="ssub">total 6 UPT · ${LAST_UPDATE}</div></div>
      <div class="stat-card"><div class="slb">Selesai</div><div class="sv" style="color:#3fb950">${(totalRawT-totalRawO).toLocaleString()}</div><div class="ssub">${Math.round((totalRawT-totalRawO)/totalRawT*100)}% dari target</div></div>
    </div>
    <div class="note-box"><strong>Catatan normalisasi:</strong> ROW B1 (vegetasi/pohon) dibagi ${ROW_DIVISOR} agar bobotnya proporsional. Tanpa normalisasi ROW B1 mendominasi 77–91% total target.</div>
    <div class="sec-head"><span class="sec-title">Status per UPT</span><span class="sec-rule"></span><span class="sec-meta">diurutkan: progress tertinggi</span></div>
    <div class="upt-grid">${uptCards}</div>
    <div class="sec-head"><span class="sec-title">Agregat G / T / P</span><span class="sec-rule"></span><span class="sec-meta">total 6 UPT</span></div>
    <div class="panels-grid">${buildGrpPanel('G')}${buildGrpPanel('T')}${buildGrpPanel('P')}</div>
    <div class="sec-head"><span class="sec-title">Tren per Kategori</span><span class="sec-rule"></span><span class="sec-meta">open mingguan · ROW B1 ÷ 100</span></div>
    <div id="rekap-tren-area"></div>
    <div class="sec-head"><span class="sec-title">Detail per Kategori</span><span class="sec-rule"></span><span class="sec-meta">Open per UPT</span></div>
    ${detailHtml}`;

  setTimeout(()=>{
    chartDefs.forEach(({cid,active,datasets,barH})=>{
      const canvas=document.getElementById(cid);
      if(!canvas)return;
      const chart=new Chart(canvas,{plugins:[darkBg],
        type:'bar',
        data:{labels:active,datasets:datasets.map(ds=>({label:ds.label,data:ds.data,backgroundColor:ds.color+'99',borderColor:ds.color,borderWidth:0,borderRadius:3}))},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{backgroundColor:'#161b22',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#e6edf3',bodyColor:'#8b949e',
            callbacks:{label:c=>{const ds=datasets.find(d=>d.label===c.dataset.label);const o=c.parsed.x,t=ds?ds.targets[c.dataIndex]:0;return ` ${c.dataset.label}: ${o.toLocaleString()}/${t.toLocaleString()} (${pct(o,t)}%)`;}}}},
          scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{font:{size:9,family:'DM Mono'},color:'#484f58',callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}},y:{grid:{display:false},ticks:{font:{size:9,family:'DM Mono'},color:'#8b949e'}}}}
      });
      _rekapCharts.push(chart);
    });

    // Build tren charts per category (akumulasi 6 UPT) in rekap tab
    const trenArea = document.getElementById('rekap-tren-area');
    if (trenArea) {
      const nWL = WL.length;
      let trenHtml = '';
      const trenQueue = [];

      ['G','T','P'].forEach(grp => {
        const gm = GROUP_META[grp];
        const allSubs = new Set();
        UPTS.forEach(u => Object.keys(D[u][grp]).forEach(k => allSubs.add(k)));
        const activeSubs = [...allSubs].filter(name =>
          UPTS.some(u => { const a=D[u][grp][name]; return a && a.some(p=>p.t>0||p.o>0); })
        );
        if (!activeSubs.length) return;

        trenHtml += `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;margin-top:16px;padding-bottom:8px;border-bottom:1px solid var(--line)">
          <span style="font-family:var(--font-m);font-size:11px;padding:2px 8px;border-radius:4px;background:${gm.badge_bg};color:${gm.badge_txt}">${grp}</span>
          <span style="font-size:11px;color:var(--text2)">${gm.label.split('–')[1].trim()}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:8px">`;

        activeSubs.forEach((name, si) => {
          const isROW = ROW_KEYS.includes(name);
          const cid = 'tren_' + grp + '_' + si;

          // Aggregate open across all UPTs per week
          const aggO = WL.map((_,wi) => {
            let total = 0;
            UPTS.forEach(upt => {
              const arr = D[upt][grp][name] || [];
              const v = wi < arr.length ? safeO(arr,wi) : (arr.length ? arr[arr.length-1].o : 0);
              total += isROW ? v/ROW_DIVISOR : v;
            });
            return isROW ? Math.round(total) : total;
          });
          const aggT = WL.map((_,wi) => {
            let total = 0;
            UPTS.forEach(upt => {
              const arr = D[upt][grp][name] || [];
              const v = wi < arr.length ? safeT(arr,wi) : (arr.length ? arr[arr.length-1].t : 0);
              total += isROW ? v/ROW_DIVISOR : v;
            });
            return isROW ? Math.round(total) : total;
          });

          const lastO = aggO[aggO.length-1];
          const lastT = aggT[aggT.length-1];
          const p = lastT > 0 ? Math.round((1 - lastO/lastT)*100) : 100;
          const pc = p===100?'#3fb950':p===0?'#f85149':'#d29922';

          trenQueue.push({cid, name, aggO, aggT, isROW, p, pc});
          trenHtml += `<div class="cat-chart-card" style="border-top:2px solid ${gm.bar}40">
            <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:10px;font-weight:600;font-family:var(--font-m);color:${gm.badge_txt}">${name}${isROW?' <span style="font-size:8px;opacity:0.5">÷100</span>':''}</span>
              <span style="font-size:11px;font-weight:700;font-family:var(--font-m);color:${pc}">${p}%</span>
            </div>
            <div style="position:relative;width:100%;height:110px"><canvas id="${cid}"></canvas></div>
            <div style="display:flex;justify-content:space-between;margin-top:5px;font-family:var(--font-m);font-size:9px;color:var(--text3)">
              <span>open: <span style="color:${gm.badge_txt}">${lastO.toLocaleString()}${isROW?' (adj)':''}</span></span>
              <span>target: ${lastT.toLocaleString()}${isROW?' (adj)':''}</span>
            </div>
          </div>`;
        });
        trenHtml += '</div>';
      });

      trenArea.innerHTML = trenHtml;

      trenQueue.forEach(({cid, aggO, aggT, isROW, name}) => {
        const canvas = document.getElementById(cid);
        if (!canvas) return;
        const chart = new Chart(canvas, {plugins:[darkBg],
          type: 'line',
          data: {
            labels: WL,
            datasets: [
              {label:'Target', data:aggT, borderColor:'rgba(88,166,255,0.35)', borderDash:[4,3], borderWidth:1.5, pointRadius:0, tension:0.3, fill:false},
              {label:'Open',   data:aggO, borderColor:'#58a6ff', backgroundColor:'rgba(88,166,255,0.1)', borderWidth:2,
               pointRadius: WL.map((_,i)=>i===WL.length-1?5:2), pointBackgroundColor:'#58a6ff', tension:0.3, fill:true}
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false, animation:{duration:300},
            plugins: {
              legend:{display:false},
              tooltip:{
                backgroundColor:'#161b22', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
                titleColor:'#e6edf3', bodyColor:'#8b949e',
                callbacks:{label: c => {
                  const o=c.parsed.y, t=aggT[c.dataIndex];
                  const p=t>0?Math.round((1-o/t)*100):100;
                  if(c.dataset.label==='Open') return ` Open: ${o.toLocaleString()}${isROW?' (adj)':''} — ${p}% selesai`;
                  return ` Target: ${o.toLocaleString()}${isROW?' (adj)':''}`;
                }}
              }
            },
            scales:{
              x:{grid:{color:'rgba(255,255,255,0.03)'}, ticks:{font:{size:8,family:'DM Mono'},color:'#484f58',autoSkip:true,maxTicksLimit:5,maxRotation:45}},
              y:{beginAtZero:true, grid:{color:'rgba(255,255,255,0.03)'}, ticks:{font:{size:8,family:'DM Mono'},color:'#484f58',callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v}}
            }
          }
        });
        _rekapCharts.push(chart);
      });
    }
  },50);
}

// ── PER UPT ──────────────────────────────────────────────────────────────
function renderNavUtabs(){
  document.getElementById('utabs').innerHTML=UPTS.map(u=>`<button class="utab${u===activeUpt?' on':''}" onclick="setUpt('${u}')">${u}</button>`).join('');
}

function renderUptSummary(){
  const n=WL.length-1;
  let totT=0,totO=0,prevO=0;
  ['G','T','P'].forEach(g=>{const c=groupAggAdj(activeUpt,g,n);const pv=groupAggAdj(activeUpt,g,Math.max(0,n-1));totT+=c.t;totO+=c.o;prevO+=pv.o;});
  const prog=pct(totO,totT),pc=prog>=80?'#3fb950':prog>=50?'#d29922':'#f85149';
  const delta=prevO-totO,ds=delta>0?`<span style="color:#3fb950">▼ ${delta.toLocaleString()}</span>`:delta<0?`<span style="color:#f85149">▲ ${Math.abs(delta).toLocaleString()}</span>`:`<span style="color:var(--text3)">—</span>`;
  document.getElementById('srow-upt').innerHTML=`<div class="stat-row" style="margin-bottom:20px">
    <div class="stat-card"><div class="slb">Target</div><div class="sv">${Math.round(totT).toLocaleString()}</div><div class="ssub">normalisasi</div></div>
    <div class="stat-card"><div class="slb">Open</div><div class="sv" style="color:#f85149">${Math.round(totO).toLocaleString()}</div><div class="ssub">${ds} vs kemarin</div></div>
    <div class="stat-card"><div class="slb">Progress</div><div class="sv" style="color:${pc}">${prog}%</div><div class="ssub">${Math.round(totT-totO).toLocaleString()} selesai</div></div>
    <div class="stat-card"><div class="slb">Update</div><div class="sv" style="font-size:14px;padding-top:6px;font-family:var(--font-m)">${LAST_UPDATE}</div><div class="ssub">data terkini</div></div>
  </div>`;
}

function renderUptPanels(){
  const n=WL.length-1;
  document.getElementById('panels').innerHTML=['G','T','P'].map(gKey=>{
    const gm=GROUP_META[gKey];
    const rows=Object.entries(D[activeUpt][gKey]).map(([name,arr])=>{
      const t=safeT(arr,n),o=safeO(arr,n);if(!t&&!o)return'';
      const p=pct(o,t),oc=oColor(o,t);
      const d=arr[Math.max(0,n-1)].o-o;
      const ds=d>0?`<span class="delta-tag" style="color:#3fb950">▼${d}</span>`:d<0?`<span class="delta-tag" style="color:#f85149">▲${Math.abs(d)}</span>`:'';
      return `<div class="cat-row"><div class="cat-top"><span class="cat-name">${name}</span><span class="cat-nums" style="color:${oc}">${o.toLocaleString()}/${t.toLocaleString()}${ds}</span><span class="cat-pct" style="color:${oc}">${p}%</span></div><div class="cat-bar-bg"><div class="cat-bar-f" style="width:${p}%;background:${gm.bar}"></div></div></div>`;
    }).filter(Boolean).join('');
    const agg=groupAggAdj(activeUpt,gKey,n),gp=pct(agg.o,agg.t);
    return `<div class="gpanel"><div class="gpanel-head"><span class="gpanel-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${gKey}</span><span class="gpanel-label">${gm.label.split('–')[1].trim()}</span><span class="gpanel-pct" style="color:${oColor(agg.o,agg.t)}">${gp}%</span></div>${rows||'<div style="font-size:11px;color:var(--text3)">—</div>'}</div>`;
  }).join('');
}

function renderUptCharts(){
  _uptCharts=destroyCharts(_uptCharts);
  const n=WL.length-1;
  let sectionsHtml='';
  const chartQueue=[];

  ['G','T','P'].forEach(grp=>{
    const gm=GROUP_META[grp];
    const active=Object.entries(D[activeUpt][grp]).filter(([,arr])=>arr.some(p=>p.t>0||p.o>0));
    if(!active.length)return;

    let cardsHtml='';
    active.forEach(([name,arr],i)=>{
      const col=CAT_COLORS[i%CAT_COLORS.length];
      const isROW=ROW_KEYS.includes(name);
      const cid=`upt_${grp}_${i}`;
      const lastO=safeO(arr,n),lastT=safeT(arr,n);
      const p=pct(lastO,lastT),pc=p===100?'#3fb950':p===0?'#f85149':'#d29922';
      const tData=WL.map((_,wi)=>{const v=arr[wi]?safeT(arr,wi):safeT(arr,n);return isROW?Math.round(v/ROW_DIVISOR):v;});
      const oData=WL.map((_,wi)=>{const v=arr[wi]?safeO(arr,wi):safeO(arr,n);return isROW?Math.round(v/ROW_DIVISOR):v;});
      chartQueue.push({cid,name,tData,oData,col});
      const tj = TINJUT_TODAY[activeUpt] || 0;
      const tjBadge = (tj > 0 && isROW) ? `<span style="color:#ffa502;font-family:var(--font-m);font-size:9px;font-weight:600">▶ TL: ${tj.toLocaleString()}</span>` : '';
      cardsHtml+=`<div class="cat-chart-card" style="border-top:2px solid ${col}">
        <div class="cat-chart-top">
          <span class="cat-chart-name" style="color:${col}">${name}${isROW?' <span style="font-size:8px;opacity:0.5">÷100</span>':''}</span>
          <span class="cat-chart-pct" style="color:${pc}">${p}%</span>
        </div>
        <div class="cat-chart-wrap"><canvas id="${cid}" style="display:block;width:100%;height:100%"></canvas></div>
        <div class="cat-chart-foot">
          <span>open: <span style="color:${col}">${isROW?lastO.toLocaleString()+' pohon':lastO.toLocaleString()}</span></span>
          <span style="display:flex;align-items:center;gap:6px">${tjBadge}<span style="${tjBadge?'font-size:9px;color:var(--text3)':''}">target: ${safeT(arr,0).toLocaleString()}${isROW?' pohon':''}</span></span>
        </div>
      </div>`;
    });

    const tjTotal = TINJUT_TODAY[activeUpt] || 0;
    const lastDate = WL[WL.length-1]||'';
    const tjDetail = (TINJUT_DETAIL[lastDate]||{})[activeUpt]||[];
    const tjDetailHtml = tjDetail.length>0
      ? tjDetail.map(function(x){
          return '<span style="font-family:var(--font-m);font-size:9px;color:#ffa502;margin-left:8px">'+x.kat+': <b>'+x.jml+'</b>'+(x.ket?' ('+x.ket+')':'')+'</span>';
        }).join('')
      : '';
    const tjSectionBadge = (tjTotal > 0 && grp === 'T') 
      ? '<span style="margin-left:auto;font-family:var(--font-m);font-size:10px;font-weight:600;color:#ffa502;background:rgba(255,165,2,0.1);border:1px solid rgba(255,165,2,0.3);padding:2px 8px;border-radius:4px">▶ Tindak Lanjut: '+tjTotal.toLocaleString()+tjDetailHtml+'</span>'
      : (tjTotal > 0 ? '<span style="margin-left:auto;font-family:var(--font-m);font-size:10px;color:#ffa502">▶ Tindak Lanjut: '+tjTotal.toLocaleString()+tjDetailHtml+'</span>' : '');
    sectionsHtml+=`<div class="charts-section">
      <div class="charts-section-head">
        <span class="charts-grp-badge" style="background:${gm.badge_bg};color:${gm.badge_txt}">${grp}</span>
        <span style="font-size:11px;color:var(--text2)">${gm.label.split('–')[1].trim()}</span>
        ${tjSectionBadge}
      </div>
      <div class="cat-charts-grid">${cardsHtml}</div>
    </div>`;
  });

  document.getElementById('charts-area').innerHTML=sectionsHtml;

  setTimeout(()=>{
    chartQueue.forEach(({cid,name,tData,oData,col})=>{
      const canvas=document.getElementById(cid);
      if(!canvas){console.warn('canvas not found:',cid);return;}
      // Build jData: tinjut for last point on ROW B1 only
      const totalTinjut = TINJUT_TODAY[activeUpt] || 0;
      let jData = null;
      if (totalTinjut > 0 && ROW_KEYS.includes(name)) {
        const jVal = Math.round(totalTinjut/ROW_DIVISOR);
        jData = WL.map((_,wi) => wi === WL.length-1 ? jVal : null);
      }
      _uptCharts.push(makeLineChart(canvas,WL,tData,oData,col,jData));
    });
  },100);
}

function renderUptView(){
  renderNavUtabs();
  renderUptSummary();
  renderUptPanels();
  renderUptCharts();
}

// ── MAIN ──────────────────────────────────────────────────────────────────



function renderPerformance(){
  const n = WL.length - 1;

  function calcSpeed(upt, normalize){
    const opens = WL.map(function(_,wi){
      var total = 0;
      ['G','T','P'].forEach(function(g){
        Object.entries(D[upt][g]).forEach(function(entry){
          var name = entry[0], arr = entry[1];
          if(wi < arr.length){
            var o = safeO(arr,wi);
            total += (normalize && ROW_KEYS.includes(name)) ? o/ROW_DIVISOR : o;
          }
        });
      });
      return total;
    });
    var reductions = opens.slice(1).map(function(o,i){ return opens[i]-o; });
    var totalReduced = opens[0] - opens[n];
    var avgWeekly = totalReduced / n;
    var activeWeeks = reductions.filter(function(r){return r>0;}).length;
    var avgActive = activeWeeks > 0 ? totalReduced/activeWeeks : 0;
    var bestVal = Math.max.apply(null, reductions);
    var bestIdx = reductions.indexOf(bestVal);
    var bestPeriod = WL[bestIdx]+'→'+WL[bestIdx+1];
    var pctDone = opens[0]>0 ? Math.round((totalReduced/opens[0])*100) : 0;
    return {upt:upt, opens:opens, totalReduced:totalReduced, avgWeekly:avgWeekly,
            avgActive:avgActive, activeWeeks:activeWeeks, bestVal:bestVal,
            bestPeriod:bestPeriod, pctDone:pctDone, initialOpen:opens[0], currentOpen:opens[n]};
  }

  function th(txt, align){
    align = align||'left';
    return '<th style="padding:8px 12px;text-align:'+align+';font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">'+txt+'</th>';
  }
  function td(content, align, extra){
    align = align||'left';
    extra = extra||'';
    return '<td style="padding:11px 12px;text-align:'+align+';'+extra+'">'+content+'</td>';
  }

  function buildTable(data, normalize){
    var sorted = data.slice().sort(function(a,b){return b.avgWeekly-a.avgWeekly;});
    var maxAvg = Math.max.apply(null, sorted.map(function(r){return r.avgWeekly;}));
    var medals = ['🥇','🥈','🥉'];

    var rows = sorted.map(function(r,i){
      var col = UPT_COLORS[r.upt];
      var barW = maxAvg>0 ? Math.round(r.avgWeekly/maxAvg*100) : 0;
      var medal = medals[i] || (i+1)+'.';
      var pc = r.pctDone>=70?'#00e5a0':r.pctDone>=40?'#ffa502':'#ff4757';
      var bar = '<div style="background:rgba(0,212,255,0.08);border-radius:3px;height:6px;overflow:hidden">'
              + '<div style="width:'+barW+'%;height:100%;background:'+col+';border-radius:3px"></div>'
              + '</div>';
      return '<tr style="border-bottom:1px solid var(--line)">'
        + td('<span style="font-size:15px">'+medal+'</span>')
        + td('<span style="font-family:var(--font-m);font-size:12px;font-weight:700;color:'+col+'">'+r.upt+'</span>')
        + td('<span style="color:var(--accent);font-weight:600;font-family:var(--font-m);font-size:12px">'+r.avgWeekly.toFixed(1)+'</span><span style="color:var(--text3);font-size:10px;font-family:var(--font-m)">/minggu</span>', 'right')
        + td('<span style="font-family:var(--font-m);font-size:11px;color:var(--text2)">'+r.avgActive.toFixed(1)+'</span><span style="color:var(--text3);font-size:9px;font-family:var(--font-m)">/mggu aktif</span>', 'right')
        + td('<span style="font-family:var(--font-m);font-size:11px;color:var(--text3)">'+r.activeWeeks+'/14</span>', 'center')
        + td('<span style="font-family:var(--font-m);font-size:11px;font-weight:600;color:'+pc+'">'+r.pctDone+'%</span>', 'right')
        + td(bar, 'left', 'min-width:130px')
        + td('<span style="font-family:var(--font-m);font-size:10px;color:var(--text3)">+'+r.bestVal.toFixed(0)+' ('+r.bestPeriod+')</span>')
        + '</tr>';
    }).join('');

    var thead = '<thead><tr style="border-bottom:1px solid rgba(0,212,255,0.15)">'
      + th('#') + th('UPT') + th('RATA-RATA/MINGGU','right')
      + th('SAAT AKTIF','right') + th('MINGGU AKTIF','center')
      + th('% SELESAI','right') + th('KECEPATAN') + th('TERBAIK')
      + '</tr></thead>';
    return '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
      + thead + '<tbody>'+rows+'</tbody></table></div>';
  }

  function buildPrediction(normData){
    var lastDateMs = new Date('2026-04-13').getTime();
    var endOfYear  = new Date('2026-12-31').getTime();
    var msPerWeek  = 7*24*3600*1000;
    var weeksLeft  = (endOfYear - lastDateMs) / msPerWeek;

    var enriched = normData.map(function(r){
      var wn = r.avgWeekly > 0 ? r.currentOpen / r.avgWeekly : Infinity;
      var fms = lastDateMs + wn * msPerWeek;
      var will = fms <= endOfYear;
      var oEOY = r.avgWeekly > 0 ? Math.max(0, r.currentOpen - r.avgWeekly*weeksLeft) : r.currentOpen;
      var pEOY = r.initialOpen > 0 ? Math.round((r.initialOpen-oEOY)/r.initialOpen*100) : 0;
      var fd = new Date(fms);
      var fs = wn===Infinity ? '—' : fd.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
      var speedMin = (!will && r.avgWeekly>0) ? (r.currentOpen/weeksLeft).toFixed(1) : null;
      return {upt:r.upt, currentOpen:r.currentOpen, avgWeekly:r.avgWeekly, initialOpen:r.initialOpen,
              wn:wn, fms:fms, will:will, oEOY:oEOY, pEOY:pEOY, fs:fs, speedMin:speedMin, col:UPT_COLORS[r.upt]};
    }).sort(function(a,b){ return a.will===b.will ? a.fms-b.fms : (b.will?1:-1); });

    var canFinish = enriched.filter(function(r){return r.will;}).length;
    var wlr = Math.round(weeksLeft);
    var needSpeed = enriched.filter(function(r){return r.speedMin;})
      .map(function(r){return r.upt.slice(0,3)+' '+r.speedMin;}).join(', ') || '—';

    var sc = '<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px">'
      + '<div class="stat-card"><div class="slb">Sisa Waktu</div><div class="sv" style="color:var(--accent)">'+wlr+'</div><div class="ssub">minggu hingga 31 Des 2026</div></div>'
      + '<div class="stat-card"><div class="slb">Prediksi Selesai</div><div class="sv" style="color:#00e5a0">'+canFinish+'</div><div class="ssub">UPT selesai sebelum akhir 2026</div></div>'
      + '<div class="stat-card"><div class="slb">Perlu Akselerasi</div><div class="sv" style="color:#ff4757">'+(6-canFinish)+'</div><div class="ssub">UPT belum bisa selesai</div></div>'
      + '<div class="stat-card"><div class="slb">Kec. Min. Dibutuhkan</div><div class="sv" style="color:#ffa502;font-size:14px;padding-top:6px;font-family:var(--font-m)">'+needSpeed+'</div><div class="ssub">anomali/minggu agar selesai 2026</div></div>'
      + '</div>';

    var rows = enriched.map(function(r){
      var barCol = r.will ? '#00e5a0' : r.pEOY>=80 ? '#ffa502' : '#ff4757';
      var badge = r.will
        ? '<span style="background:rgba(0,229,160,0.12);color:#00e5a0;border:1px solid rgba(0,229,160,0.25);font-family:var(--font-m);font-size:10px;padding:3px 10px;border-radius:4px;font-weight:600">&#10003; Selesai sebelum 2027</span>'
        : '<span style="background:rgba(255,71,87,0.1);color:#ff4757;border:1px solid rgba(255,71,87,0.2);font-family:var(--font-m);font-size:10px;padding:3px 10px;border-radius:4px">&#10007; Belum selesai akhir 2026</span>';
      var speedNote = r.speedMin ? '<div style="font-family:var(--font-m);font-size:9px;color:#ffa502;margin-top:2px">Butuh min. '+r.speedMin+'/mggu</div>' : '';
      var bar = '<div style="background:rgba(0,212,255,0.08);border-radius:3px;height:8px;overflow:hidden;margin-bottom:3px">'
              + '<div style="width:'+Math.min(100,r.pEOY)+'%;height:100%;background:'+barCol+';border-radius:3px"></div></div>'
              + '<div style="font-family:var(--font-m);font-size:9px;color:var(--text3)">'+r.pEOY+'% selesai akhir 2026</div>'
              + speedNote;
      return '<tr style="border-bottom:1px solid var(--line)">'
        + td('<span style="font-family:var(--font-m);font-size:12px;font-weight:700;color:'+r.col+'">'+r.upt+'</span>')
        + td('<span style="font-family:var(--font-m);font-size:12px;color:var(--text2)">'+r.currentOpen.toFixed(0)+'</span>','right')
        + td('<span style="color:var(--accent);font-weight:600;font-family:var(--font-m);font-size:12px">'+r.avgWeekly.toFixed(1)+'</span><span style="color:var(--text3);font-size:10px;font-family:var(--font-m)">/mggu</span>','right')
        + td('<span style="font-family:var(--font-m);font-size:11px;color:'+(r.will?'#00e5a0':'#ff4757')+';font-weight:600">'+r.fs+'</span>','right')
        + td('<span style="font-family:var(--font-m);font-size:11px;color:var(--text2)">'+r.oEOY.toFixed(0)+'</span><span style="color:var(--text3);font-size:9px"> anomali</span>','right')
        + td(bar,'left','min-width:160px')
        + td(badge)
        + '</tr>';
    }).join('');

    var thead = '<thead><tr style="border-bottom:1px solid rgba(0,212,255,0.15)">'
      + th('UPT') + th('OPEN SKRG','right') + th('KECEPATAN','right')
      + th('PREDIKSI SELESAI','right') + th('SISA AKHIR 2026','right')
      + th('PROGRESS S/D AKHIR 2026') + th('STATUS')
      + '</tr></thead>';

    return sc
      + '<div class="chart-card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
      + thead + '<tbody>'+rows+'</tbody></table></div>'
      + '<div class="note-box" style="margin-top:12px;font-size:10px">'
      + '<strong>Asumsi:</strong> Kecepatan konstan = rata-rata mingguan sejak 08 Feb 2026 (normalisasi ROW B1 ÷ 100). '
      + 'Sisa waktu: <strong>'+wlr+' minggu</strong> (13 Apr → 31 Des 2026). '
      + '"Butuh X/mggu" = kecepatan minimum agar selesai tepat akhir 2026.</div>';
  }

  var rawData  = UPTS.map(function(u){return calcSpeed(u, false);});
  var normData = UPTS.map(function(u){return calcSpeed(u, true);});
  var normSorted = normData.slice().sort(function(a,b){return b.avgWeekly-a.avgWeekly;});
  var medals = ['🥇','🥈','🥉'];

  var summaryCards = normSorted.map(function(r,i){
    var col = UPT_COLORS[r.upt];
    var m = medals[i]||'';
    return '<div class="stat-card" style="border-top:2px solid '+col+'">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      + '<span style="font-size:16px">'+m+'</span>'
      + '<span style="font-family:var(--font-m);font-size:11px;font-weight:700;color:'+col+'">'+r.upt+'</span></div>'
      + '<div style="font-size:22px;font-weight:800;color:var(--accent);font-family:var(--font-d);line-height:1">'+r.avgWeekly.toFixed(1)+'</div>'
      + '<div style="font-family:var(--font-m);font-size:10px;color:var(--text3);margin-top:4px">anomali/minggu (adj)</div>'
      + '<div style="font-family:var(--font-m);font-size:10px;color:var(--text2);margin-top:6px">'+r.pctDone+'% selesai · '+r.activeWeeks+'/14 minggu aktif</div>'
      + '</div>';
  }).join('');

  var noteBox = '<div class="note-box" style="margin-bottom:18px">'
    + '<strong>Cara baca:</strong> Rata-rata anomali yang diselesaikan per minggu sejak 08 Feb 2026. '
    + 'Versi <strong>normalisasi</strong> menggunakan ROW B1 ÷ 100. '
    + 'Versi <strong>tanpa normalisasi</strong> menggunakan angka mentah.</div>';

  var html = ''
    + '<div class="sec-head"><span class="sec-title">Performance UPT</span><span class="sec-rule"></span><span class="sec-meta">Kecepatan penyelesaian anomali · '+LAST_UPDATE+'</span></div>'
    + noteBox
    + '<div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:24px">'+summaryCards+'</div>'
    + '<div class="sec-head" style="margin-top:4px"><span class="sec-title">Dengan Normalisasi ROW B1 ÷ 100</span><span class="sec-rule"></span><span class="sec-meta">bobot proporsional</span></div>'
    + '<div class="chart-card" style="margin-bottom:20px">'+buildTable(normData, true)+'</div>'
    + '<div class="sec-head"><span class="sec-title">Tanpa Normalisasi</span><span class="sec-rule"></span><span class="sec-meta">angka mentah · ROW B1 dalam satuan pohon</span></div>'
    + '<div class="chart-card" style="margin-bottom:20px">'+buildTable(rawData, false)+'</div>'
    + '<div class="note-box" style="margin-bottom:0;font-size:10px"><strong>Minggu Aktif:</strong> Jumlah minggu open benar-benar berkurang. Total 14 periode 08 Feb – 13 Apr 2026. <strong>Terbaik:</strong> Periode penyelesaian terbanyak dalam satu minggu.</div>'
    + '<div class="sec-head" style="margin-top:28px"><span class="sec-title">Prediksi Penyelesaian Akhir Tahun</span><span class="sec-rule"></span><span class="sec-meta">asumsi kecepatan konstan · normalisasi ROW B1 ÷ 100</span></div>'
    + buildPrediction(normData);

  // Append TINJUT history section
  var lastDate = WL[WL.length-1]||'';
  var tinjutHtml = buildTinjutHistory();
  document.getElementById('view-performance').innerHTML = html + tinjutHtml;
}

    return '<div class="sec-head" style="margin-top:28px"><span class="sec-title">Riwayat Tindak Lanjut</span><span class="sec-rule"></span><span class="sec-meta">data dari tab TINJUT</span></div>'
      +'<div class="note-box">Tab TINJUT belum dikonfigurasi atau belum ada data.</div>';

  var rows = '';

          +'<td style="padding:8px 12px;font-family:var(--font-m);font-size:12px;font-weight:600;color:#ffa502;text-align:right">'+x.jml.toLocaleString()+'</td>'
          +'<td style="padding:8px 12px;font-family:var(--font-m);font-size:10px;color:var(--text3)">'+x.ket+'</td>'
          +'</tr>';
      });
    });
  });
  var thead = '<thead><tr style="border-bottom:1px solid rgba(0,212,255,0.15)">'
    +'<th style="padding:8px 12px;text-align:left;font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">TANGGAL</th>'
    +'<th style="padding:8px 12px;text-align:left;font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">UPT</th>'
    +'<th style="padding:8px 12px;text-align:left;font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">KATEGORI</th>'
    +'<th style="padding:8px 12px;text-align:right;font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">JUMLAH</th>'
    +'<th style="padding:8px 12px;text-align:left;font-family:var(--font-m);font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.08em">KETERANGAN</th>'
    +'</tr></thead>';
  return '<div class="sec-head" style="margin-top:28px"><span class="sec-title">Riwayat Tindak Lanjut</span><span class="sec-rule"></span><span class="sec-meta">'+Object.values(TINJUT_DETAIL).reduce(function(s,v){return s+Object.values(v).reduce(function(s2,a){return s2+a.length;},0);},0)+' entri</span></div>'
    +'<div class="chart-card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
    +thead+'<tbody>'+rows+'</tbody></table></div>';
}

    }).join('');
  }

  var uptTabs = UPTS.map(function(u){

async function submitInputData(upt, tanggal){
  var statusEl = document.getElementById('submit-status-'+upt);

  // Validasi password
  var pwdEl = document.getElementById('inp_pwd_'+upt);
  var pwd = pwdEl ? pwdEl.value.trim() : '';
  if(!pwd){
    statusEl.innerHTML='<span style="color:#f85149">⚠ Password UPT belum diisi.</span>';
    if(pwdEl) pwdEl.focus();
    return;
  }
  if(pwd.toUpperCase() !== upt.toUpperCase()){
    statusEl.innerHTML='<span style="color:#f85149">⚠ Password salah. Password adalah nama UPT.</span>';
    if(pwdEl){ pwdEl.value=''; pwdEl.style.borderColor='#f85149'; pwdEl.focus(); }
    setTimeout(function(){ if(pwdEl) pwdEl.style.borderColor='var(--line)'; }, 2000);
    return;
  }

  var scriptUrl = window.APPS_SCRIPT_URL || localStorage.getItem('apps_script_url') || '';
  if(!scriptUrl){
    statusEl.innerHTML='<span style="color:#f85149">⚠ URL Apps Script belum diisi.</span>';
    return;
  }

  // Collect data
  var SUBS = ['G1 AHI Trafo','G1 Anti Binatang','G1 Relay Internal','G2 MV Aparatus','G3 Switchyard AHI','G4 GIS','G5 Common Facility',
    'T1 Cable Sheath','T2 SUTT AHI','T2 ROW B1','T2 Anti Binatang','T2 Tapak Tower',
    'P1 AHI Proteksi','P1 Design Proteksi','P2 AHI Catu Daya','P2 Design Catu Daya'];
  var n = WL.length > 0 ? WL.length-1 : 0;
  var row = [tanggal];
  SUBS.forEach(function(sk){
    var grpKey = GROUP_OF[sk];
    var grpData = D[upt] && D[upt][grpKey];
    var arr = grpData && grpData[sk];
    var prevT = safeT(arr, arr ? arr.length-1 : 0);
    var oEl = document.getElementById('inp_o_'+upt+'_'+sk.replace(/\s/g,'_'));
    var jEl = document.getElementById('inp_j_'+upt+'_'+sk.replace(/\s/g,'_'));
    var o = oEl ? (parseInt(oEl.value)||0) : 0;
    var j = jEl ? (parseInt(jEl.value)||0) : 0;
    row.push(prevT, o, j);
  });

  statusEl.innerHTML='<span style="color:#d29922">⏳ Mengirim data ke Google Sheets...</span>';

  // Gunakan JSONP approach untuk bypass CORS
  // Kirim data via URL parameter, Apps Script baca dari doGet
  var rowEncoded = encodeURIComponent(JSON.stringify(row));
  var url = scriptUrl + '?upt='+encodeURIComponent(upt)
    +'&tanggal='+encodeURIComponent(tanggal)
    +'&row='+rowEncoded
    +'&callback=_gsCallback';

  window._gsCallback = function(result){
    // cleanup
    var s = document.getElementById('_gs_script');
    if(s) s.remove();
    delete window._gsCallback;
    if(result && result.status==='ok'){
      statusEl.innerHTML='<span style="color:#3fb950">✓ Data berhasil dikirim ke Google Sheets! Dashboard akan refresh dalam 1 jam.</span>';
    } else {
      statusEl.innerHTML='<span style="color:#f85149">⚠ Error: '+(result&&result.message||'Unknown error')+'</span>';
    }
  };

  // Timeout fallback
  var timeout = setTimeout(function(){
    if(window._gsCallback){
      delete window._gsCallback;
      var s = document.getElementById('_gs_script');
      if(s) s.remove();
      // no-cors fetch as last resort - we won't get response but data may still go through
      statusEl.innerHTML='<span style="color:#d29922">⚠ Tidak ada respons dari Apps Script. Coba cek Google Sheets apakah data sudah masuk.</span>';
    }
  }, 10000);

  // Inject script tag for JSONP
  var sc = document.createElement('script');
  sc.id = '_gs_script';
  sc.src = url;
  sc.onerror = function(){
    clearTimeout(timeout);
    delete window._gsCallback;
    // Fallback: try no-cors fetch (fire and forget)
    fetch(scriptUrl+'?upt='+encodeURIComponent(upt)+'&tanggal='+encodeURIComponent(tanggal)+'&row='+rowEncoded, {
      method:'GET', mode:'no-cors'
    }).then(function(){
      statusEl.innerHTML='<span style="color:#d29922">⚠ Data dikirim (no-cors). Cek Google Sheets untuk konfirmasi.</span>';
    }).catch(function(){
      statusEl.innerHTML='<span style="color:#f85149">⚠ Gagal terhubung. Pastikan URL Apps Script benar dan sudah di-deploy sebagai Web App (Anyone).</span>';
    });
  };
  document.head.appendChild(sc);
}

function generateWAText(upt, tanggal){

function generateRekapWAText(tanggal){
  var n = WL.length-1;
  var lines = [];
  lines.push('*KONDISI COMMON ENEMY PT PLN Persero UIT JBM '+tanggal+'*');
  lines.push('*I. TARGET / OPEN / TINJUT*');

  // For each WA section, sum T, O, J across all 6 UPTs
  WA_SECTIONS.forEach(function(sec){
    lines.push(sec.header);
    sec.items.forEach(function(item, idx){
      var letter = WA_LETTERS[idx] || String.fromCharCode(97+idx);
      var totT=0, totO=0, totJ=0;
      if(item.sk){
        UPTS.forEach(function(upt){
          var grpKey = GROUP_OF[item.sk];
          var arr = D[upt][grpKey] && D[upt][grpKey][item.sk];
          if(arr && arr.length>0){
            totT += safeT(arr,n);
            totO += safeO(arr,n);
            totJ += safeJ(arr,n)||0;
          }
        });
        // Also check input form if currently open
        UPTS.forEach(function(upt){
          var jEl = document.getElementById('inp_j_'+upt+'_'+item.sk.replace(/\s/g,'_'));
          if(jEl){ totJ += parseInt(jEl.value)||0; }
        });
      }
      // For null sk (fixed=0), always 0/0/0
      lines.push(letter+'. '+item.label+' : '+totT+' / '+totO+' / '+totJ);
    });
  });
  return lines.join('\n');
}

  var dataReady = WL && WL.length>0 && D && D.MALANG && D.MALANG.G && Object.keys(D.MALANG.G).length>0;
  if(!dataReady){
    if(activeView!=='input') return;
  }
  if(activeView==='rekap') renderRekap();
  else if(activeView==='upt') renderUptView();
  else if(activeView==='performance') renderPerformance();
  else if(activeView==='input') renderInputForm();
}

document.getElementById('topdate').textContent=LAST_UPDATE;
renderAll();


// ── Boot ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  initDashboard();
});
</script>
